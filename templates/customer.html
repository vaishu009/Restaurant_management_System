<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details - Tasty Bites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow border-0 rounded-4 p-4" style="max-width: 400px; width: 100%;">
            <h3 class="text-center fw-bold mb-4">Customer Details</h3>
            <form action="{{ url_for('customer_details') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control form-control-lg rounded-pill" placeholder="Enter your name" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" name="phone" class="form-control form-control-lg rounded-pill" placeholder="Enter mobile number" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow">Confirm Order</button>
            </form>
        </div>
    </div>
</body>
</html>
