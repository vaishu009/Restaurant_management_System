<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Tasty Bites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Tasty Bites</a>
            <div class="ms-auto">
                <a href="{{ url_for('cart') }}" class="btn btn-light position-relative">
                    🛒 Cart
                    {% if session.get('cart') %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ session.get('cart')|length }}
                    </span>
                    {% endif %}
                </a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-5 fw-bold">Our Delicious Menu</h2>

        {% for category, items in categories.items() %}
        <section class="mb-5">
            <h3 class="border-bottom pb-2 text-primary fw-bold">{{ category }}</h3>
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mt-2">
                {% for item in items %}
                <div class="col">
                    <div class="card h-100 border-0 shadow-sm rounded-3">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">{{ item.item_name }}</h5>
                            <p class="card-text text-success fs-5">₹{{ item.price }}</p>
                            <form action="{{ url_for('add_to_cart') }}" method="POST" class="mt-3">
                                <input type="hidden" name="item_id" value="{{ item.item_id }}">
                                <input type="hidden" name="item_name" value="{{ item.item_name }}">
                                <input type="hidden" name="price" value="{{ item.price }}">
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white">Qty</span>
                                    <input type="number" name="quantity" class="form-control" value="1" min="1" max="10">
                                </div>
                                <button type="submit" class="btn btn-outline-primary w-100 rounded-pill">Add to Cart</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </section>
        {% endfor %}
    </div>

    <div class="fixed-bottom p-3 text-center d-md-none">
        <a href="{{ url_for('cart') }}" class="btn btn-primary btn-lg w-100 shadow rounded-pill">Go to Cart</a>
    </div>
</body>
</html>
