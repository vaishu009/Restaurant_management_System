<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Tasty Bites Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <div class="container d-flex flex-column align-items-center justify-content-center vh-100 text-center">
        <div class="card shadow-lg p-5 rounded-4 border-0" style="max-width: 500px;">
            <h1 class="display-4 fw-bold text-primary mb-3">Tasty Bites</h1>
            <p class="lead text-muted mb-4">Experience the best flavors in town. Scan, Order, and Enjoy!</p>
            <div class="mb-4">
                <img src="{{ qr_code_url }}" alt="Menu QR Code" class="img-fluid shadow-sm border p-2 bg-white mb-2" style="width: 200px;">
                <p class="text-muted small">Scan to View Menu (Assigned Table: {{ table_number }})</p>
            </div>
            <div class="d-grid gap-2">
                <a href="{{ url_for('menu', table_id=table_number) }}" class="btn btn-primary btn-lg px-5 py-3 rounded-pill fw-bold shadow">View Menu Directly</a>
            </div>
        </div>
    </div>
</body>
</html>
