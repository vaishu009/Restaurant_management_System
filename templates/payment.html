<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Tasty Bites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow border-0 rounded-4 p-4" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Payment</h3>
                <p class="text-muted">Total Amount to Pay</p>
                <h1 class="display-5 fw-bold text-primary">₹{{ amount }}</h1>
            </div>
            
            <form action="{{ url_for('payment') }}" method="POST" id="paymentForm">
                <div class="mb-4">
                    <label class="form-label d-block mb-3">Select Payment Method</label>
                    
                    <div class="form-check border rounded-3 p-3 mb-2 payment-option" onclick="toggleUPI(true)">
                        <input class="form-check-input ms-0 me-3" type="radio" name="payment_method" id="upi" value="UPI" checked>
                        <label class="form-check-label w-100" for="upi">
                            <span class="fw-bold">UPI</span> (GPay, PhonePe, Paytm)
                        </label>
                    </div>

                    <!-- UPI QR Code Section -->
                    <div id="upiQRSection" class="text-center my-4 p-3 border rounded-4 bg-white shadow-sm">
                        <p class="small text-muted mb-2">Scan with any UPI App to Pay</p>
                        <img id="upiQRCode" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=kanevaishnavi-1@okhdfcbank%26pn=Vaishnavi%20Kane%26am={{ amount }}%26cu=INR" 
                             alt="UPI QR Code" class="img-fluid border p-2 mb-2" style="width: 180px;">
                        <p class="fw-bold text-dark mb-0">UPI ID: kanevaishnavi-1@okhdfcbank</p>
                        <div class="mt-3">
                            <button type="button" class="btn btn-outline-primary btn-sm rounded-pill" onclick="confirmPayment()">I have Paid</button>
                        </div>
                    </div>
                    
                    <div class="form-check border rounded-3 p-3 mb-2 payment-option" onclick="toggleUPI(false)">
                        <input class="form-check-input ms-0 me-3" type="radio" name="payment_method" id="card" value="Card">
                        <label class="form-check-label w-100" for="card">
                            <span class="fw-bold">Debit / Credit Card</span>
                        </label>
                    </div>
                    
                    <div class="form-check border rounded-3 p-3 mb-2 payment-option" onclick="toggleUPI(false)">
                        <input class="form-check-input ms-0 me-3" type="radio" name="payment_method" id="cash" value="Cash">
                        <label class="form-check-label w-100" for="cash">
                            <span class="fw-bold">Cash</span>
                        </label>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm">Confirm Order</button>
            </form>
        </div>
    </div>

    <script>
        function toggleUPI(show) {
            const qrSection = document.getElementById('upiQRSection');
            const submitBtn = document.getElementById('submitBtn');
            if (show) {
                qrSection.style.display = 'block';
                submitBtn.style.display = 'none'; // Hide main button until "I have paid" is clicked or other method chosen
            } else {
                qrSection.style.display = 'none';
                submitBtn.style.display = 'block';
                submitBtn.innerText = 'Confirm Order';
            }
        }

        function confirmPayment() {
            // Simulate payment verification
            alert("Payment recorded! Proceeding to generate your bill.");
            document.getElementById('paymentForm').submit();
        }

        // Initialize state
        window.onload = function() {
            toggleUPI(document.getElementById('upi').checked);
        }
    </script>
</body>
</html>
